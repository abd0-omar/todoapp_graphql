[package]
name = "todoapp_graphql-jwt-jsonwebtoken"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
doctest = false

[dependencies]
jsonwebtoken = { version = "10.3.0", default-features = false, features = ["rust_crypto"] }
serde = { version = "1.0", features = ["derive"] }
todoapp_graphql-jwt-port = { path = "../jwt_port" }
