[package]
name = "todoapp_graphql-db"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
# examples in docs don't run without a running database, etc.
doctest = false

[dependencies]
refinery = { version = "0.9.0", default-features = false, features = ["tokio-postgres"] }
rootcause = "0.12.1"
todoapp_graphql-config = { path = "../config" }
todoapp_graphql-db-queries = { path = "../db_queries" }
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "1.5", features = ["serde"] }
validator = { version = "0.20", features = ["derive"] }
chrono = { version = "0.4.44", features = ["serde"] }
