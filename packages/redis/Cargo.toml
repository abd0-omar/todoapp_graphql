[package]
name = "todoapp_graphql-redis"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
doctest = false

[dependencies]
async-trait = "0.1"
redis = { version = "1.2.0", features = ["tokio-comp", "connection-manager"] }
todoapp_graphql-refresh-token-port = { path = "../refresh_token_port" }
tokio = { version = "1.51.1", features = ["rt"] }
