[package]
name = "todoapp_graphql-web"
version = "0.0.1"
edition = "2021"
publish = false

[lib]
# examples in docs don't run without a running database, etc.
doctest = false

[dependencies]
argon2 = { version = "0.5.3", features = ["password-hash"] }
axum = { version = "0.8", features = ["macros"] }
todoapp_graphql-config = { path = "../config" }
todoapp_graphql-db = { path = "../db" }
todoapp_graphql-jwt-jsonwebtoken = { path = "../jwt_jsonwebtoken" }
todoapp_graphql-jwt-port = { path = "../jwt_port" }
todoapp_graphql-refresh-token-port = { path = "../refresh_token_port" }
todoapp_graphql-redis = { path = "../redis" }
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.34", features = ["full"] }
tower-http = { version = "0.6", features = ["full"] }
tracing = "0.1"
tracing-panic = "0.1"
tracing-subscriber = { version = "0.3", features = [
    "env-filter",
    "registry",
    "fmt",
] }
rootcause = "0.12.1"
uuid = { version = "1.6", features = ["serde"] }
validator = "0.20"
async-graphql = { version = "7.2.1", features = ["chrono", "uuid"] }
async-graphql-axum = "7.2.1"
chrono = { version = "0.4", features = ["serde"] }
rand_core = { version = "0.6", features = ["getrandom"] }
secrecy = "0.10.3"
