procs:
  rust:
    shell: |
      export APP_DATABASE__URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
      export DATABASE_URL="${APP_DATABASE__URL}"
      exec bacon --job run
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: todoapp_graphql
      DB_PASSWORD: todoapp_graphql
      DB_NAME: todoapp_graphql
  postgres:
    cmd:
      - sh
      - -c
      - |
        name=todoapp_graphql_postgres
        if docker container inspect "$name" >/dev/null 2>&1; then
          if [ "$(docker inspect -f '{{.State.Running}}' "$name")" = true ]; then
            exec docker attach "$name"
          else
            exec docker start -a "$name"
          fi
        else
          exec docker run --name "$name" \
            -e POSTGRES_PASSWORD=todoapp_graphql \
            -e POSTGRES_USER=todoapp_graphql \
            -e POSTGRES_DB=todoapp_graphql \
            -p 5432:5432 \
            postgres
        fi
