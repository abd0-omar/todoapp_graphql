procs:
  web:
    shell: |
      : "${DATABASE_URL}"
      : "${APP_SERVER__PORT:=3000}"
      export APP_SERVER__PORT
      exec portless --app-port "${APP_SERVER__PORT}" web bacon --job run
  db:
    cmd:
      - sh
      - -c
      - |
        : "${POSTGRES_CONTAINER_NAME}"
        : "${POSTGRES_USER}"
        : "${POSTGRES_PASSWORD}"
        : "${POSTGRES_DB}"
        : "${POSTGRES_PORT}"
        name="$POSTGRES_CONTAINER_NAME"
        if docker container inspect "$name" >/dev/null 2>&1; then
          if [ "$(docker inspect -f '{{.State.Running}}' "$name")" = true ]; then
            exec docker attach "$name"
          else
            exec docker start -a "$name"
          fi
        else
          exec docker run --name "$name" \
            -e "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            -e "POSTGRES_USER=${POSTGRES_USER}" \
            -e "POSTGRES_DB=${POSTGRES_DB}" \
            -p "${POSTGRES_PORT}:5432" \
            postgres
        fi
  redis:
    cmd:
      - sh
      - -c
      - |
        : "${REDIS_CONTAINER_NAME}"
        : "${REDIS_PORT}"
        : "${REDIS_IMAGE}"
        name="$REDIS_CONTAINER_NAME"
        if docker container inspect "$name" >/dev/null 2>&1; then
          if [ "$(docker inspect -f '{{.State.Running}}' "$name")" = true ]; then
            exec docker attach "$name"
          else
            exec docker start -a "$name"
          fi
        else
          exec docker run --name "$name" -p "${REDIS_PORT}:6379" "$REDIS_IMAGE"
        fi
  frontend:
    shell: |
      exec portless frontend sh -c 'exec npm --prefix packages/frontend run dev -- --host 127.0.0.1 --strictPort --port "${PORT}"'
