name: CI

on:
  push:
    branches:
      - main
  pull_request: {}


jobs:
  rustfmt:
    name: "Rust Format"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt

    - name: fmt
      run: cargo fmt --all --check

  clippy:
    name: "Clippy"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: todoapp_graphql
          POSTGRES_USER: todoapp_graphql
          POSTGRES_PASSWORD: todoapp_graphql
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: clippy
    - name: migrate
      run: cargo db reset
    - name: clippy
      run: cargo clippy --all-targets -- -D warnings

  test:
    name: "Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: todoapp_graphql
          POSTGRES_USER: todoapp_graphql
          POSTGRES_PASSWORD: todoapp_graphql
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: install hurl
      run: |
        sudo apt-get update
        sudo apt-get install -y hurl curl
    - name: migrate
      run: cargo db reset
    - name: start app
      run: |
        cargo run > /tmp/todoapp_graphql.log 2>&1 &
        timeout 30 bash -c 'until curl --silent --show-error --fail \
          --header "Content-Type: application/json" \
          --data "{\"query\":\"query { __typename }\"}" \
          http://127.0.0.1:3000/graphql > /dev/null; do sleep 1; done'
    - name: hurl
      run: ./tests/run.sh
    - name: dump app log on failure
      if: failure()
      run: cat /tmp/todoapp_graphql.log
